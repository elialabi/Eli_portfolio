<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Workflows — Elizabeth Alabi</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #F7F5F0;
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow: hidden;
  user-select: none;
}

/* ── Header ── */
.wf-header {
  position: fixed; top:0; left:0; right:0; height:52px;
  background: rgba(247,245,240,0.95);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid #E8E4DC;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 36px; z-index:100;
}
.wf-wordmark {
  font-family: 'Instrument Serif', serif;
  font-size: 15px; color: #1A1A1A;
}
.wf-wordmark em { font-style: italic; color: #888; }

.header-right { display:flex; align-items:center; gap:14px; }

.hint-pill {
  font-family: 'DM Mono', monospace;
  font-size: 8px; letter-spacing: 0.15em; text-transform: uppercase;
  padding: 4px 10px; border: 1px solid #E8E4DC;
  color: #AAA; transition: opacity 0.5s;
}

.nav-arrows { display:flex; gap:6px; }
.nav-btn {
  width:30px; height:30px; border:1px solid #E8E4DC; background:white;
  border-radius:50%; display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:11px; color:#666; transition:all 0.15s;
}
.nav-btn:hover { border-color:#999; color:#1A1A1A; }
.nav-btn:disabled { opacity:0.25; cursor:default; }
.counter-text { font-family:'DM Mono',monospace; font-size:9px; color:#999; letter-spacing:0.12em; }

/* ── Slide track ── */
.slide-track {
  position: fixed; top:52px; bottom:0; left:0;
  display: flex;
  transition: transform 0.65s cubic-bezier(0.77,0,0.18,1);
}

.slide {
  width: 100vw; height: calc(100vh - 52px);
  flex-shrink: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative;
  cursor: pointer;
}

/* slide info */
.slide-meta {
  position: absolute; top:18px; left:36px; pointer-events: none;
  transition: opacity 0.4s;
}
.slide-sector {
  font-family:'DM Mono',monospace; font-size:8px;
  letter-spacing:0.2em; text-transform:uppercase; color:#AAA; margin-bottom:3px;
}
.slide-name {
  font-family:'Instrument Serif',serif; font-size:clamp(16px,2.2vw,26px);
  font-weight:400; color:#1A1A1A; line-height:1.2; margin-bottom:4px;
}
.slide-desc {
  font-size:11px; color:#999; line-height:1.65; max-width:300px;
}

/* ── DIAGRAM CANVAS ── */
.diagram {
  position: relative;
  width: 100%;
  height: 100%;
  display: flex; align-items: center; justify-content: center;
}

/* SVG overlay for connectors */
.diagram-svg {
  position: absolute; inset:0;
  width:100%; height:100%;
  pointer-events: none; overflow: visible;
  z-index: 1;
}

/* ── NODE ── */
.wf-node {
  position: absolute;
  display: flex; flex-direction: column; align-items: center;
  gap: 6px;
  /* Hub position set via JS */
  transition:
    left 0.7s cubic-bezier(0.77,0,0.18,1),
    top  0.7s cubic-bezier(0.77,0,0.18,1),
    transform 0.7s cubic-bezier(0.77,0,0.18,1);
  z-index: 10;
  pointer-events: all;
}

.node-circle {
  border-radius: 50%;
  background: white;
  border: 3px solid var(--nc);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px -4px var(--nc);
  transition:
    width  0.7s cubic-bezier(0.77,0,0.18,1),
    height 0.7s cubic-bezier(0.77,0,0.18,1),
    box-shadow 0.2s;
  overflow: hidden;
  position: relative;
}

.node-circle svg { transition: width 0.4s, height 0.4s; }

.node-step {
  position: absolute; bottom: -2px; right: -2px;
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--nc); color: white;
  font-family: 'DM Mono', monospace; font-size: 8px; font-weight: 500;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.3s 0.4s;
}

.linear-state .node-step { opacity: 1; }

.node-name {
  font-family: 'DM Mono', monospace; font-size: 9px;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: #444; text-align: center; max-width: 80px; line-height: 1.4;
  transition: font-size 0.4s, color 0.3s, max-width 0.4s;
}

.node-sub {
  font-size: 9px; color: #AAA; text-align: center;
  transition: opacity 0.3s;
  opacity: 0;
}

.linear-state .node-sub { opacity: 1; }

/* Centre node */
.centre-circle {
  position: absolute;
  border-radius: 50%;
  background: white;
  border: 3px solid #E8E4DC;
  display: flex; flex-direction:column; align-items: center; justify-content: center; gap:3px;
  z-index: 10;
  transition: opacity 0.4s, transform 0.5s;
  pointer-events: none;
}
.centre-icon { font-size: 28px; line-height:1; }
.centre-label {
  font-family:'DM Mono',monospace; font-size:7px;
  letter-spacing:0.08em; text-transform:uppercase; color:#999; text-align:center;
}

/* Hide centre when linear */
.linear-state .centre-circle { opacity: 0; transform: scale(0.8); }

/* Connector path in SVG */
.hub-conn { transition: opacity 0.3s; }
.linear-conn {
  transition: opacity 0.3s 0.5s;
  opacity: 0;
}
.linear-state .hub-conn { opacity: 0; }
.linear-state .linear-conn { opacity: 1; }

/* Click hint ripple */
.click-hint {
  position: absolute; top:50%; left:50%;
  transform: translate(-50%,-50%);
  font-family:'DM Mono',monospace; font-size:9px;
  letter-spacing:0.15em; text-transform:uppercase; color:#CCC;
  pointer-events:none; z-index:0;
  transition: opacity 0.5s;
}
.linear-state .click-hint { opacity:0; }

/* Node tooltip */
.wf-tooltip {
  position: fixed; background: white;
  border: 1px solid #E8E4DC; border-top: 2px solid var(--tc,#333);
  padding: 10px 14px; max-width: 220px;
  box-shadow: 0 6px 24px -6px rgba(0,0,0,0.12);
  z-index: 200; pointer-events: none;
  opacity: 0; transition: opacity 0.12s;
  font-size: 10px; color: #555; line-height: 1.6;
}
.wf-tooltip.show { opacity: 1; }
.tt-label { font-family:'DM Mono',monospace; font-size:7px; letter-spacing:0.15em; text-transform:uppercase; color:var(--tc,#333); margin-bottom:4px; }

/* Progress */
.pdots {
  position: fixed; bottom:18px; left:50%; transform:translateX(-50%);
  display:flex; gap:6px; z-index:100; pointer-events:all;
}
.pdot {
  width:5px; height:5px; border-radius:50%; background:#CCC;
  cursor:pointer; transition:all 0.2s;
}
.pdot.active { background:#1A1A1A; transform:scale(1.4); }
</style>
</head>

<div class="wf-header">
  <div class="wf-wordmark">AI <em>Workflows</em></div>

<div class="slide-track" id="slide-track"></div>
<div class="pdots" id="pdots"></div>

// ── State ─────────────────────────────────────────────────────────────────────
let current = 0;
const linearStates = new Array(FLOWS.length).fill(false);
const track = document.getElementById('slide-track');
const tooltip = document.getElementById('tooltip');
let autoTimer = null;

// ── Build slides ──────────────────────────────────────────────────────────────
FLOWS.forEach((flow, fi) => {
  const slide = document.createElement('div');
  slide.className = 'slide';
  slide.id = `slide-${fi}`;

  // Meta
  const meta = document.createElement('div');
  meta.className = 'slide-meta';
  meta.innerHTML = `
    <div class="slide-sector">${flow.sector}</div>
    <div class="slide-name">${flow.name}</div>
    <div class="slide-desc">${flow.desc}</div>
    ${flow.timeSaving ? '<div style="margin-top:8px;font-family:\'DM Mono\',monospace;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:' + flow.color + ';opacity:0.9">✓ ' + flow.timeSaving + '</div>' : ''}`;
  slide.appendChild(meta);

  // Diagram canvas
  const diag = document.createElement('div');
  diag.className = 'diagram';
  diag.id = `diag-${fi}`;

  // SVG for connectors
  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.className = 'diagram-svg';
  svg.id = `svg-${fi}`;
  diag.appendChild(svg);

  // Centre node
  const cn = document.createElement('div');
  cn.className = 'centre-circle';
  cn.id = `centre-${fi}`;
  cn.style.cssText = `width:80px;height:80px;border-color:${flow.color};box-shadow:0 0 0 8px ${flow.color}15;left:50%;top:50%;transform:translate(-50%,-50%)`;
  cn.innerHTML = `<span class="centre-icon">${flow.centre.icon}</span><span class="centre-label">${flow.centre.label}</span>`;
  diag.appendChild(cn);

  // Click hint
  const hint = document.createElement('div');
  hint.className = 'click-hint';
  hint.textContent = '↓ click to expand';
  diag.appendChild(hint);

  // Nodes
  flow.nodes.forEach((node, ni) => {
    const el = document.createElement('div');
    el.className = 'wf-node';
    el.id = `node-${fi}-${ni}`;
    el.style.cssText = `--nc:${flow.color};left:50%;top:50%;transform:translate(-50%,-50%)`;

    el.innerHTML = `
      <div class="node-circle" style="width:60px;height:60px;--nc:${flow.color}">
        ${L[node.logo]||''}
        <div class="node-step">${ni+1}</div>
      </div>
      <div class="node-name">${node.name}</div>
      <div class="node-sub">${node.sub}</div>`;

    // Tooltip
    el.addEventListener('mouseenter', e => {
      e.stopPropagation();
      tooltip.style.setProperty('--tc', flow.color);
      document.getElementById('tt-label').textContent = `${node.name} · ${node.sub}`;
      document.getElementById('tt-what').textContent = node.desc;
      tooltip.classList.add('show');
      moveTip(e);
    });
    el.addEventListener('mousemove', e => { e.stopPropagation(); moveTip(e); });
    el.addEventListener('mouseleave', () => tooltip.classList.remove('show'));
    el.addEventListener('click', e => { e.stopPropagation(); });

    diag.appendChild(el);
  });

  // Click to toggle
  diag.addEventListener('click', () => toggleLinear(fi));

  slide.appendChild(diag);
  track.appendChild(slide);

  // Progress dot
  const dot = document.createElement('div');
  dot.className = 'pdot' + (fi===0?' active':'');
  dot.addEventListener('click', () => goTo(fi));
  document.getElementById('pdots').appendChild(dot);

  // Draw hub connectors initially
  requestAnimationFrame(() => drawHub(fi));
});

// ── Hub layout ────────────────────────────────────────────────────────────────
function getHubPos(fi, ni) {
  const diag = document.getElementById(`diag-${fi}`);
  const w = diag.offsetWidth, h = diag.offsetHeight;
  const cx = w/2, cy = h/2;
  const R = Math.min(w, h) * 0.32;
  const rad = (FLOWS[fi].nodes[ni].angle * Math.PI) / 180;
  return { x: cx + R*Math.cos(rad), y: cy + R*Math.sin(rad) };
}

function getLinearPos(fi, ni) {
  const flow = FLOWS[fi];
  const n = flow.nodes.length;
  const diag = document.getElementById(`diag-${fi}`);
  const w = diag.offsetWidth, h = diag.offsetHeight;
  const totalW = n * 90 + (n-1) * 60;
  const startX = (w - totalW) / 2 + 45;
  const y = h / 2;
  return { x: startX + ni * 150, y };
}

function setNodePos(fi, ni, pos, isLinear) {
  const el = document.getElementById(`node-${fi}-${ni}`);
  if (!el) return;
  el.style.left = pos.x + 'px';
  el.style.top  = pos.y + 'px';
  el.style.transform = 'translate(-50%, -50%)';
  const circle = el.querySelector('.node-circle');
  if (circle) {
    circle.style.width = isLinear ? '72px' : '60px';
    circle.style.height = isLinear ? '72px' : '60px';
    const svg = circle.querySelector('svg');
    if(svg) { svg.style.width = isLinear?'32px':'26px'; svg.style.height = isLinear?'32px':'26px'; }
  }
}

function toggleLinear(fi) {
  linearStates[fi] = !linearStates[fi];
  const isLin = linearStates[fi];
  const diag = document.getElementById(`diag-${fi}`);
  const flow = FLOWS[fi];

  if(isLin) diag.classList.add('linear-state');
  else diag.classList.remove('linear-state');

  // Move nodes
  flow.nodes.forEach((node, ni) => {
    const pos = isLin ? getLinearPos(fi, ni) : getHubPos(fi, ni);
    setNodePos(fi, ni, pos, isLin);
  });

  // Update hint
  document.getElementById('hint-pill').textContent = isLin ? 'Click to collapse' : 'Click diagram to expand';

  // Redraw connectors after transition
  setTimeout(() => drawConnectors(fi, isLin), 50);

  // Always restart auto from current state
  clearTimeout(autoTimer);
  if(fi === current) startAuto();
}

// ── Draw connectors ───────────────────────────────────────────────────────────
function drawHub(fi) {
  const svg = document.getElementById(`svg-${fi}`);
  if(!svg) return;
  svg.innerHTML = '';
  const diag = document.getElementById(`diag-${fi}`);
  const w = diag.offsetWidth, h = diag.offsetHeight;
  const cx = w/2, cy = h/2;
  const flow = FLOWS[fi];
  const R = Math.min(w,h)*0.32;

  flow.nodes.forEach((node, ni) => {
    const rad = (node.angle * Math.PI)/180;
    const nx = cx + R*Math.cos(rad);
    const ny = cy + R*Math.sin(rad);
    const off = 38;
    const mx = cx + off*Math.cos(rad), my = cy + off*Math.sin(rad);
    const ex = nx - off*Math.cos(rad), ey = ny - off*Math.sin(rad);

    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',ex); line.setAttribute('y1',ey);
    line.setAttribute('x2',mx); line.setAttribute('y2',my);
    line.setAttribute('stroke', flow.color);
    line.setAttribute('stroke-width','2');
    line.setAttribute('stroke-dasharray','5 4');
    line.setAttribute('stroke-opacity','0.4');
    line.setAttribute('class','hub-conn');
    svg.appendChild(line);

    // Position node at hub pos initially
    setNodePos(fi, ni, {x:nx, y:ny}, false);
  });

  svg.setAttribute('width', w);
  svg.setAttribute('height', h);
}

function drawConnectors(fi, isLin) {
  const svg = document.getElementById(`svg-${fi}`);
  if(!svg) return;
  svg.innerHTML = '';
  const diag = document.getElementById(`diag-${fi}`);
  const w = diag.offsetWidth, h = diag.offsetHeight;
  svg.setAttribute('width', w);
  svg.setAttribute('height', h);
  const flow = FLOWS[fi];

  if (!isLin) {
    // Hub connectors
    const cx = w/2, cy = h/2;
    const R = Math.min(w,h)*0.32;
    flow.nodes.forEach((node, ni) => {
      const rad = (node.angle*Math.PI)/180;
      const nx = cx + R*Math.cos(rad), ny = cy + R*Math.sin(rad);
      const off = 38;
      const mx = cx + off*Math.cos(rad), my = cy + off*Math.sin(rad);
      const ex = nx - off*Math.cos(rad), ey = ny - off*Math.sin(rad);
      const line = document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1',ex); line.setAttribute('y1',ey);
      line.setAttribute('x2',mx); line.setAttribute('y2',my);
      line.setAttribute('stroke',flow.color);
      line.setAttribute('stroke-width','2');
      line.setAttribute('stroke-dasharray','5 4');
      line.setAttribute('stroke-opacity','0.4');
      svg.appendChild(line);
    });
  } else {
    // Linear connectors — snake path like reference image
    const n = flow.nodes.length;
    const totalW = n * 90 + (n-1) * 60;
    const startX = (w - totalW) / 2 + 45;
    const y = h / 2;
    const points = flow.nodes.map((_,ni) => ({
      x: startX + ni*150, y
    }));

    // Draw curved path through all points
    if(points.length > 1) {
      let d = `M ${points[0].x} ${points[0].y}`;
      for(let i=1; i<points.length; i++) {
        const cp1x = points[i-1].x + 40;
        const cp2x = points[i].x - 40;
        d += ` C ${cp1x} ${points[i-1].y} ${cp2x} ${points[i].y} ${points[i].x} ${points[i].y}`;
      }
      const path = document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d', d);
      path.setAttribute('stroke', flow.color);
      path.setAttribute('stroke-width','2.5');
      path.setAttribute('stroke-dasharray','6 4');
      path.setAttribute('fill','none');
      path.setAttribute('stroke-opacity','0.5');
      svg.appendChild(path);

      // Arrow heads between nodes
      points.forEach((p, i) => {
        if(i < points.length-1) {
          const mx = (p.x + points[i+1].x)/2;
          const poly = document.createElementNS('http://www.w3.org/2000/svg','polygon');
          poly.setAttribute('points',`${mx+6},${p.y} ${mx-4},${p.y-5} ${mx-4},${p.y+5}`);
          poly.setAttribute('fill',flow.color);
          poly.setAttribute('opacity','0.6');
          svg.appendChild(poly);
        }

        // Step label below
        const lbl = document.createElementNS('http://www.w3.org/2000/svg','text');
        lbl.setAttribute('x', p.x);
        lbl.setAttribute('y', p.y + 56);
        lbl.setAttribute('text-anchor','middle');
        lbl.setAttribute('font-size','9');
        lbl.setAttribute('font-family','DM Mono,monospace');
        lbl.setAttribute('fill', flow.color);
        lbl.setAttribute('letter-spacing','0.05em');
        lbl.textContent = String(i+1).padStart(2,'0');
        svg.appendChild(lbl);
      });
    }
  }
}

// ── Navigation ────────────────────────────────────────────────────────────────
function goTo(n) {
  // Collapse current if linear
  if(linearStates[current]) toggleLinear(current);
  current = Math.max(0, Math.min(FLOWS.length-1, n));
  track.style.transform = `translateX(-${current*100}vw)`;
  document.getElementById('counter').textContent =
    `${String(current+1).padStart(2,'0')} / ${String(FLOWS.length).padStart(2,'0')}`;
  document.querySelectorAll('.pdot').forEach((d,i) => d.classList.toggle('active', i===current));
  document.getElementById('btn-prev').disabled = current===0;
  document.getElementById('btn-next').disabled = current===FLOWS.length-1;
  startAuto();
}

function startAuto() {
  clearTimeout(autoTimer);
  if (paused) return;
  autoTimer = setTimeout(() => {
    if(!linearStates[current]) toggleLinear(current);
    autoTimer = setTimeout(() => {
      if (paused) return;
      if(current < FLOWS.length - 1) goTo(current + 1);
      else goTo(0);
    }, 3000);
  }, 3000);
}

// Tooltip
function moveTip(e) {
  const x=e.clientX+14, y=e.clientY-8;
  const tw=tooltip.offsetWidth||220, th=tooltip.offsetHeight||60;
  tooltip.style.left=(x+tw>window.innerWidth-12?x-tw-28:x)+'px';
  tooltip.style.top=(y+th>window.innerHeight-12?y-th:y)+'px';
}

// Keys + touch
document.addEventListener('keydown', e => {
  if(e.key==='ArrowLeft') goTo(current-1);
  if(e.key==='ArrowRight') goTo(current+1);
});
let tx0=0;
document.addEventListener('touchstart', e => tx0=e.touches[0].clientX);
document.addEventListener('touchend', e => {
  const dx=e.changedTouches[0].clientX-tx0;
  if(Math.abs(dx)>50) goTo(current+(dx<0?1:-1));
});

// Wire nav buttons
document.getElementById('btn-prev').addEventListener('click', () => goTo(current-1));
document.getElementById('btn-next').addEventListener('click', () => goTo(current+1));

// Pause button
document.getElementById('btn-pause').addEventListener('click', () => {
  paused = !paused;
  const btn = document.getElementById('btn-pause');
  if (paused) {
    clearTimeout(autoTimer);
    btn.textContent = '▶';
    btn.title = 'Resume auto-advance';
    btn.style.color = 'var(--gold, #E8B84B)';
  } else {
    btn.textContent = '⏸';
    btn.title = 'Pause auto-advance';
    btn.style.color = '';
    startAuto();
  }
});

let paused = false;

// Init after layout
window.addEventListener('load', () => {
  FLOWS.forEach((_,fi) => { requestAnimationFrame(() => drawHub(fi)); });
  goTo(0);
});
window.addEventListener('resize', () => {
  FLOWS.forEach((_,fi) => {
    const isLin = linearStates[fi];
    FLOWS[fi].nodes.forEach((_,ni) => {
      const pos = isLin ? getLinearPos(fi,ni) : getHubPos(fi,ni);
      setNodePos(fi,ni,pos,isLin);
    });
    drawConnectors(fi,isLin);
  });
});
